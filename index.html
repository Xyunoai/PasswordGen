<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PasswordGen</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>PasswordGen</h1>

  <label for="length">Password Length (max 150)</label>
  <input type="number" id="length" placeholder="Enter length" max="150">

  <div class="options">
    <label><input type="checkbox" id="letters" checked> Letters</label>
    <label><input type="checkbox" id="numbers" checked> Numbers</label>
    <label><input type="checkbox" id="symbols" checked> Symbols</label>
  </div>

  <button id="generate">Generate Password</button>

  <textarea id="output" placeholder="Your password will appear here" readonly></textarea>

  <p class="privacy">We do not sell, share, or take your passwords.</p>
</div>

</body>
</html>
